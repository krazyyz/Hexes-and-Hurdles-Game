<!DOCTYPE html>
<html>
<head>
    <title>Hexes and Hurdles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 1080;
const H = 760;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
    const scaleX = window.innerWidth / W;
    const scaleY = window.innerHeight / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Game states
const STATE = { TITLE: 0, PLAYING: 1, MONSTER: 2, WIN: 3 };
let gameState = STATE.TITLE;
let currentLevel = 1;
let monsterSpawned = false;
let monsterAdded = false;
let typedAnswer = '';
let currentMessage = '';
let messageTimer = 0;
let showIntro = false;
let introTimer = 0;

// Images
const images = {};
const imageFiles = [
    'idle','jumpleft','jumpright','runleft','runright',
    'morning','evening','night',
    'obstacle1','obstacle2','obstacle3',
    'potassium','sodium','water',
    'titlescreen','play','monster'
];
imageFiles.forEach(name => {
    images[name] = new Image();
    images[name].src = name + '.png';
});

// Intersection helper
function intersects(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// Tiles
let tiles = [];

function makeWall(x, y, w, h, solid, type) {
    return {
        x: Math.round(x), y: Math.round(y),
        w: Math.round(w), h: Math.round(h),
        solid, type: type || 'wall', collected: false
    };
}

function loadLevel(level) {
    tiles = [];
    if (level === 1) {
        tiles.push(makeWall(59*1.617,  324*2.032, 62*1.617,  13*2.032, true));
        tiles.push(makeWall(136*1.617, 282*2.032, 61*1.617,  7*2.032,  true));
        tiles.push(makeWall(224*1.617, 323*2.032, 55*1.617,  13*2.032, true));
        tiles.push(makeWall(365*1.617, 324*2.032, 60*1.617,  12*2.032, true));
        tiles.push(makeWall(410*1.617, 282*2.032, 56*1.617,  8*2.032,  true));
        tiles.push(makeWall(464*1.617, 235*2.032, 61*1.617,  13*2.032, true));
        tiles.push(makeWall(570*1.617, 194*2.032, 96*1.617,  26*2.032, true));
    } else if (level === 2) {
        tiles.push(makeWall(24*1.617,  335*2.038, 63*1.617,  13*2.038, true));
        tiles.push(makeWall(102*1.617, 296*2.038, 56*1.617,  7*2.038,  true));
        tiles.push(makeWall(201*1.617, 296*2.038, 59*1.617,  7*2.038,  true));
        tiles.push(makeWall(346*1.617, 334*2.038, 58*1.617,  14*2.038, true));
        tiles.push(makeWall(435*1.617, 318*2.038, 59*1.617,  13*2.038, true));
        tiles.push(makeWall(474*1.617, 284*2.038, 59*1.617,  14*2.038, true));
        tiles.push(makeWall(546*1.617, 251*2.038, 58*1.617,  14*2.038, true));
        tiles.push(makeWall(591*1.617, 207*2.038, 76*1.617,  18*2.038, true));
        // Potassium potion on last platform
        tiles.push(makeWall(591*1.617+30, 207*2.038-80, 60, 80, false, 'potion'));
    } else if (level === 3) {
        tiles.push(makeWall(0,          401*1.836, 601*1.794, 12*1.836, true));
        tiles.push(makeWall(0,          103*1.836, 147*1.794, 17*1.836, true));
        tiles.push(makeWall(170*1.794,  192*1.836, 64*1.794,  16*1.836, true));
        tiles.push(makeWall(251*1.794,  286*1.836, 159*1.794, 17*1.836, true));
        tiles.push(makeWall(393*1.794,  0,         17*1.794,  283*1.836, true));
        tiles.push(makeWall(412*1.794,  55*1.836,  86*1.794,  18*1.836, true));
        tiles.push(makeWall(508*1.794,  137*1.836, 79*1.794,  17*1.836, true));
        tiles.push(makeWall(412*1.794,  231*1.836, 86*1.794,  11*1.836, true));
        tiles.push(makeWall(521*1.794+30, 285*1.836, 67*1.794-30, 18*1.836, true));
        // Sodium and Water collectibles
        tiles.push(makeWall(73*1.794,  103*1.836-80, 80, 80, false, 'sodium'));
        tiles.push(makeWall(455*1.794, 55*1.836-80,  80, 80, false, 'water'));
    }
}

// Monster
const monster = {
    x: 0, y: 0, w: 80, h: 80,
    velX: 3, active: false,
    draw() {
        if (!this.active) return;
        const img = images.monster;
        if (img && img.complete && img.naturalWidth > 0)
            ctx.drawImage(img, this.x, this.y, this.w, this.h);
        else {
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
    },
    update() {
        if (!this.active) return;
        this.x += this.velX;
        if (this.x <= 0)          { this.x = 0;           this.velX =  3; }
        if (this.x + this.w >= W) { this.x = W - this.w;  this.velX = -3; }
    }
};

// Player
const player = {
    x: 80, y: 500,
    width: 62, height: 100,
    velX: 0, velY: 0,
    jumping: false,
    falling: true,
    gravity: 0.0,

    getBounds()       { return { x: this.x,       y: this.y,                   w: this.width,      h: this.height     }; },
    getBoundsTop()    { return { x: this.x+10,     y: this.y,                   w: this.width-20,   h: 5               }; },
    getBoundsBottom() { return { x: this.x+10,     y: this.y+this.height-5,     w: this.width-20,   h: 5               }; },
    getBoundsLeft()   { return { x: this.x,        y: this.y+10,                w: 5,               h: this.height-10  }; },
    getBoundsRight()  { return { x: this.x+this.width-5, y: this.y+10,          w: 5,               h: this.height-10  }; },

    reset() {
        this.x = 80; this.y = 500;
        this.velX = 0; this.velY = 0;
        this.jumping = false; this.falling = true; this.gravity = 0.0;
    },

    draw() {
        let img = images.idle;
        if (this.jumping && this.velX < 0) img = images.jumpleft;
        else if (this.jumping && this.velX > 0) img = images.jumpright;
        else if (this.velX < 0) img = images.runleft;
        else if (this.velX > 0) img = images.runright;

        if (img && img.complete && img.naturalWidth > 0)
            ctx.drawImage(img, this.x, this.y, this.width, this.height);
        else {
            ctx.fillStyle = '#8844cc';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    },

    update() {
        this.x += this.velX;
        this.y += this.velY;

        if (this.x <= 0) this.x = 0;
        if (this.y <= 0) { this.y = 0; this.velY = 0; }

        // Right edge
        if (this.x + this.width >= W) {
            if (currentLevel === 1) {
                currentLevel = 2; loadLevel(2); this.x = 0;
            } else if (currentLevel === 2) {
                currentLevel = 3; loadLevel(3); this.x = 0;
            } else if (currentLevel === 3 && !monsterSpawned) {
                monsterSpawned = true;
                gameState = STATE.MONSTER;
                typedAnswer = '';
                this.x = W - this.width;
            } else {
                this.x = W - this.width;
            }
        }

        // Fall death
        if (this.y + this.height >= H) {
            currentLevel = 1;
            monsterSpawned = false; monsterAdded = false;
            gameState = STATE.PLAYING;
            loadLevel(1); monster.active = false;
            this.reset();
        }

        // Platform collision
        let onGround = false;
        for (let t of tiles) {
            if (!t.solid) continue;
            if (intersects(this.getBoundsTop(), t)) {
                this.velY = 0;
                if (this.jumping) { this.jumping = false; this.gravity = 0.0; this.falling = true; }
            }
            if (intersects(this.getBoundsBottom(), t)) {
                this.velY = 0;
                this.y = t.y - this.height;
                this.falling = false;
                onGround = true;
            }
            if (intersects(this.getBoundsLeft(), t)) {
                this.velX = 0; this.x = t.x + t.w;
            }
            if (intersects(this.getBoundsRight(), t)) {
                this.velX = 0; this.x = t.x - this.width;
            }
        }
        if (!onGround && !this.jumping) {
            this.falling = true;
        }

        // Collectible collision
        for (let t of tiles) {
            if (t.solid || t.collected) continue;
            if (intersects(this.getBounds(), t)) {
                t.collected = true;
                if (t.type === 'potion') {
                    currentMessage = "You've obtained Potassium! This will increase your leg power!";
                } else if (t.type === 'sodium') {
                    currentMessage = "You've obtained Sodium! This must be a highly reactive potion.";
                } else if (t.type === 'water') {
                    currentMessage = "You've obtained Water! How refreshing.";
                }
                messageTimer = Date.now();
            }
        }

        // Monster collision
        if (monster.active && intersects(this.getBounds(), {x:monster.x, y:monster.y, w:monster.w, h:monster.h})) {
            currentLevel = 1; monsterSpawned = false; monsterAdded = false;
            gameState = STATE.PLAYING; loadLevel(1); monster.active = false; this.reset();
        }

        // Gravity / jumping physics
        if (this.jumping) {
            this.gravity -= 0.2;
            this.velY = Math.round(-this.gravity);
            if (this.gravity <= 0.0) { this.jumping = false; this.falling = true; }
        }
        if (this.falling) {
            this.gravity += 0.2;
            this.velY = Math.round(this.gravity);
        }
    }
};

// Input
const keys = {};

window.addEventListener('keydown', e => {
    if (['w','W','a','A','s','S','d','D','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
    // Win screen - any key returns to title
    if (gameState === STATE.WIN) {
        gameState = STATE.TITLE; currentLevel = 1;
        monsterSpawned = false; monsterAdded = false;
        typedAnswer = ''; monster.active = false;
        loadLevel(1); player.reset(); return;
    }

    // Monster question input
    if (gameState === STATE.MONSTER) {
        if (e.key === 'Backspace') {
            typedAnswer = typedAnswer.slice(0, -1);
            e.preventDefault();
        } else if (e.key === 'Enter') {
            if (typedAnswer.toLowerCase() === 'sodium') {
                gameState = STATE.WIN;
            } else {
                typedAnswer = '';
            }
        } else if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
            typedAnswer += e.key;
        }
        return;
    }

    keys[e.key] = true;

    if ((e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') && gameState === STATE.PLAYING) {
        if (!player.jumping && !player.falling) {
            player.jumping = true;
            player.falling  = false;
            player.gravity  = currentLevel === 3 ? 10.0 : 7.0;
        }
    }
});

window.addEventListener('keyup', e => {
    keys[e.key] = false;
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft')  player.velX = 0;
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') player.velX = 0;
});

canvas.setAttribute('tabindex','0');
canvas.focus();
window.focus();
window.addEventListener('click', () => { canvas.focus(); });

// Play button click
canvas.addEventListener('click', e => {
    if (gameState !== STATE.TITLE) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top)  * (H / rect.height);
    const px = W/2-75, py = H/2+100;
    if (mx >= px && mx <= px+150 && my >= py && my <= py+60) {
        gameState = STATE.PLAYING;
        showIntro = true;
        introTimer = Date.now();
        currentLevel = 1;
        loadLevel(1);
        player.reset();
    }
});

// Draw helper
function drawText(text, x, y, size, color) {
    ctx.font = `bold ${size}px Georgia, serif`;
    ctx.fillStyle = color || 'white';
    ctx.textAlign = 'center';
    ctx.fillText(text, x, y);
    ctx.textAlign = 'left';
}

function drawImg(key, x, y, w, h) {
    const img = images[key];
    if (img && img.complete && img.naturalWidth > 0)
        ctx.drawImage(img, x, y, w, h);
}

function render() {
    ctx.clearRect(0, 0, W, H);

    if (gameState === STATE.TITLE) {
        drawImg('titlescreen', 0, 0, W, H);
        drawImg('play', W/2-75, H/2+100, 150, 60);

    } else if (gameState === STATE.PLAYING || gameState === STATE.MONSTER) {
        const bgKeys  = ['morning','evening','night'];
        const obsKeys = ['obstacle1','obstacle2','obstacle3'];
        drawImg(bgKeys[currentLevel-1],  0, 0, W, H);
        drawImg(obsKeys[currentLevel-1], 0, 0, W, H);

        // Draw collectibles
        for (let t of tiles) {
            if (t.collected) continue;
            if (t.type === 'potion') drawImg('potassium', t.x, t.y, t.w, t.h);
            if (t.type === 'sodium') drawImg('sodium',    t.x, t.y, t.w, t.h);
            if (t.type === 'water')  drawImg('water',     t.x, t.y, t.w, t.h);
        }

        monster.draw();
        player.draw();

        // Intro text
        if (showIntro) {
            if (Date.now() - introTimer < 5000) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(W/2-310, H/2-65, 620, 110);
                drawText('W to Jump',                    W/2, H/2-35, 24, 'white');
                drawText('A & D to Move Left/Right',     W/2, H/2,    24, 'white');
                drawText('Obtain all Potions, Escape.',  W/2, H/2+35, 24, 'white');
            } else {
                showIntro = false;
            }
        }

        // Potion message
        if (currentMessage) {
            if (Date.now() - messageTimer < 3000) {
                ctx.font = 'bold 22px Georgia, serif';
                const msgW = ctx.measureText(currentMessage).width;
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(W/2 - msgW/2 - 14, H/2 - 36, msgW + 28, 44);
                drawText(currentMessage, W/2, H/2, 22, 'white');
            } else {
                currentMessage = '';
            }
        }

        // Monster question overlay
        if (gameState === STATE.MONSTER) {
            ctx.fillStyle = 'rgba(0,0,0,0.78)';
            ctx.fillRect(0, H/2-115, W, 240);
            drawText("Oh no! A Goblin!",                                          W/2, H/2-75, 32, '#ff6666');
            drawText("Quick! What's the name of the potion",                      W/2, H/2-35, 22, 'white');
            drawText("that would be the best option to use against your enemy?",  W/2, H/2,    22, 'white');
            drawText("Type your answer and press Enter:",                         W/2, H/2+42, 19, '#aaffaa');
            drawText(typedAnswer + '_',                                           W/2, H/2+85, 28, 'yellow');
        }

    } else if (gameState === STATE.WIN) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        // Starfield effect
        ctx.fillStyle = 'white';
        for (let i = 0; i < 80; i++) {
            ctx.fillRect((i * 137) % W, (i * 97) % H, 2, 2);
        }
        drawText("Congrats! You have Escaped.", W/2, H/2,    44, '#ffdd55');
        drawText("Press any key to return",     W/2, H/2+60, 22, '#aaaaaa');
    }
}

function update() {
    if (gameState !== STATE.PLAYING && gameState !== STATE.MONSTER) return;

    if (keys['a'] || keys['A'] || keys['ArrowLeft'])  player.velX = -5;
    if (keys['d'] || keys['D'] || keys['ArrowRight']) player.velX =  5;

    player.update();

    if (monsterSpawned && !monsterAdded) {
        monsterAdded = true;
        monster.active = true;
        // Spawn on the ground platform of level 3
        monster.x = 0;
        monster.y = Math.round(401*1.836) - 80;
        monster.velX = 3;
    }

    monster.update();
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

loadLevel(1);
gameLoop();
</script>
</body>
</html>
